sonar.projectKey=NASA-AMMOS_BSL
sonar.organization=nasa-ammos

# This is the name and version displayed in the SonarCloud UI.
sonar.projectName=BSL
sonar.projectVersion=1.1.0

# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
sonar.sources=src
sonar.tests=test,mock-bpa-test
# ignore binary test data
sonar.exclusions=**/*.cbor,**/*.cborseq
# ignore test sources
sonar.coverage.exclusions=test/**/*

# Encoding of the source code. Default is default system encoding
sonar.sourceEncoding=UTF-8

# Python used for testing from ubuntu-22.04
sonar.python.version=3.12
