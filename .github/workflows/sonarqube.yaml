name: SonarQube
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
          submodules: recursive
      - name: Prep
        run: |
          sudo apt-get update
          sudo apt-get install -y \
              cmake ninja-build ruby build-essential \
              libssl-dev libjansson-dev \
              xmlstarlet \
              python3 python3-pip python3-wheel
          pip3 install gcovr
          ./build.sh deps
          ./build.sh prep -DTEST_MEMCHECK=OFF -DBUILD_COVERAGE=ON -DBUILD_DOCS_API=OFF -DBUILD_DOCS_MAN=OFF -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
      - name: Build
        run: ./build.sh
      - name: Install
        run: ./build.sh install
      - name: Test
        run: |
          ./build.sh check
          pip3 install --upgrade pip
          pip3 install -r mock-bpa-test/requirements.txt
          python3 -m pytest mock-bpa-test
      - name: Collect coverage
        run: |
          ./build.sh --target coverage-sonarqube -v
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{secrets.SONAR_TOKEN}}
        with:
          args: >
            --define sonar.cfamily.compile-commands=build/default/compile_commands.json
            --define sonar.coverageReportPaths=build/default/coverage-sonarqube.xml
